<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Showcase</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
    line-height: 1.6;
    background-color: #f9f9f9;
}
h1 {
    color: #222;
}
.section {
    margin-bottom: 30px;
}
code {
    background: #eee;
    padding: 10px;
    display: block;
    border-radius: 5px;
}
.button {
    display: inline-block;
    padding: 10px 15px;
    background: #333;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>

<body>

<h1>Моё API</h1>

<div class="section">
<h2>Описание</h2>
<p>API для работы с данными. Быстрое, удобное, простое подключение.</p>
</div>

<div class="section">
<h2>Пример запроса</h2>
<code>
GET https://api.example.com/data  
Authorization: Bearer YOUR_API_KEY
</code>
</div>

<div class="section">
<h2>Пример ответа</h2>
<code>
{
  "status": "success",
  "data": "example"
}
</code>
</div>

<div class="section">
<h2>Контакты</h2>
<p>Email: your@email.com</p>
