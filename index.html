<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 2ГИС</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
}
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}
h1 {
    font-size: 36px;
    margin-bottom: 10px;
}
.section-title {
    margin-top: 40px;
    margin-bottom: 10px;
    font-size: 22px;
    color: #38bdf8;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
}
.map {
    width: 100%;
    height: 400px;
    border-radius: 10px;
    margin-top: 15px;
}
img {
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>API 2ГИС</h1>
<p>Демонстрация MapTiles API, Raster API и Static API</p>

<!-- 1. MapTiles API (Векторная карта) -->
<div class="section-title">1. MapTiles API (Векторная карта)</div>
<div class="card">
<div id="map-vector" class="map"></div>
</div>

<!-- 2. Raster API -->
<div class="section-title">2. Raster API (Растровая карта)</div>
<div class="card">
<div id="map-raster" class="map"></div>
</div>

<!-- 3. Static API -->
<div class="section-title">3. Static API (Статическая карта)</div>
<div class="card">
<img src="https://static.maps.2gis.com/1.0?center=82.9204,55.0302&zoom=13&size=900x400&key=3ac6a0a3-ad39-418c-baea-865ab957dc23">
</div>

</div>

<!-- ✅ Подключение MapGL -->
<script src="https://mapgl.2gis.com/api/js/v1?key=3ac6a0a3-ad39-418c-baea-865ab957dc23"></script>

<script>
const center = [82.9204, 55.0302]; // Новосибирск

// 1. Векторная карта
const mapVector = new mapgl.Map('map-vector', {
    center: center,
    zoom: 14
});

// 2. Растровая карта (отдельный экземпляр)
const mapRaster = new mapgl.Map('map-raster', {
    center: center,
    zoom: 13
});
</script>

</body>
</html>
