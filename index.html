<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Service</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 25px;
}

code {
    background: #0f172a;
    padding: 15px;
    display: block;
    border-radius: 8px;
    overflow-x: auto;
    color: #38bdf8;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: #38bdf8;
    color: #0f172a;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>My API Service</h1>
<p class="subtitle">Быстрое и удобное API для работы с данными</p>

<div class="card">
<h2>Пример запроса</h2>
<code>
GET https://api.example.com/data
Authorization: Bearer YOUR_API_KEY
</code>
</div>

<div class="card">
<h2>Пример ответа</h2>
<code>
{
  "status": "success",
  "data": "example"
}
</code>
</div>

<a href="#" class="button">Связаться</a>

</div>

</body>
</html>
