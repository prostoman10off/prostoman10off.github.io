<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>API 2ГИС — Vector + Raster</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
}
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}
.map {
    width: 100%;
    height: 400px;
    border-radius: 12px;
    margin-top: 15px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 40px;
}
h2 {
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">
    <h1>API 2ГИС</h1>

    <div class="card">
        <h2>MapTiles API (Векторная карта)</h2>
        <div id="map-vector" class="map"></div>
    </div>

    <div class="card">
        <h2>Raster Tiles API (через MapGL)</h2>
        <div id="map-raster" class="map"></div>
    </div>
</div>

<script src="https://mapgl.2gis.com/api/js/v1"></script>

<script>
const KEY = '816c3158-de01-41bb-bef2-e8bc7749e48d'; // вставь сюда свой ключ
const STYLE = 'c080bb6a-8134-4993-93a1-5b4d8c36a59b'; // стандартный стиль 2ГИС

// Векторная карта
const mapVector = new mapgl.Map('map-vector', {
    center: [37.615655, 55.768005],
    zoom: 13,
    key: KEY,
    style: STYLE
});

new mapgl.Marker(mapVector, {
    coordinates: [37.615655, 55.768005]
});

// Растровая карта (другой стиль)
const mapRaster = new mapgl.Map('map-raster', {
    center: [37.615655, 55.768005],
    zoom: 12,
    key: KEY,
    style: STYLE
});
</script>

</body>
</html>
