<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Навигация — API 2ГИС</title>
  <meta name="description" content="Построение маршрутов через Routing API" />
  
  <style>
    /* Общие стили для меню и фона */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      overflow: hidden; /* Чтобы карта занимала весь экран */
    }

    /* Стили для навигационного меню */
    nav {
      background: #1e293b;
      padding: 15px 0;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1000;
    }

    nav .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #f1f5f9;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    nav a.active {
      color: #38bdf8;
      text-decoration: underline;
    }

    /* Стили для контейнера карты */
    #container {
      width: 100%;
      height: calc(100vh - 60px); /* Высота экрана минус высота меню */
      margin-top: 0;
    }

    /* Стили для кнопок управления */
    .controls {
      position: absolute;
      top: 80px; /* Чуть ниже меню */
      left: 20px;
      z-index: 1000;
      background: rgba(30, 41, 59, 0.9);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .controls button {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      background-color: #0078FF;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background-color: #0056b3;
    }

    .controls button:disabled {
      background: #475569;
      color: #94a3b8;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <!-- Меню навигации -->
  <nav>
    <div class="nav-container">
      <a href="index.html">Главная</a>
      <a href="search.html">Поиск</a>
      <a href="navigation.html" class="active">Навигация</a>
    </div>
  </nav>

  <!-- Контейнер для карты -->
  <div id="container"></div>

  <!-- Кнопка сброса -->
  <div class="controls">
    <button id="resetButton" disabled>Выберите две точки на карте</button>
  </div>

  <!-- Подключение MapGL -->
  <script src="https://mapgl.2gis.com/api/js/v1"></script>

  <script>
    // ✅ ВСТАВЬ СЮДА СВОЙ КЛЮЧ
    const API_KEY = 'fe4adee4-e725-4509-809d-c0b52219c501';
    
    // URL для запроса к Routing API
    const reqUrl = `https://routing.api.2gis.com/routing/7.0.0/global?key=${API_KEY}`;

    const map = new mapgl.Map('container', {
      center: [37.619655, 55.758005],
      zoom: 13,
      key: API_KEY, // ✅ Вставлен ключ здесь
      style: 'c080bb6a-8134-4993-93a1-5b4d8c36a59b' // Можно добавить стиль, если нужно
    });

    const markers = [];
    let firstPoint = null;
    let secondPoint = null;
    let routeLine = null;
    let selecting = 'a';
    const resetButton = document.getElementById('resetButton');

    resetButton.addEventListener('click', () => {
      selecting = 'a';
      firstPoint = null;
      secondPoint = null;
      if (routeLine) routeLine.destroy();
      markers.forEach((marker) => marker.destroy());
      markers.length = 0;
      resetButton.disabled = true;
      resetButton.textContent = 'Выберите две точки на карте';
    });

    map.on('click', (event) => {
      if (!event || !event.lngLat || !Array.isArray(event.lngLat) || event.lngLat.length !== 2) {
        console.error("Invalid click event: lngLat is undefined or invalid");
        return;
      }

      const [lng, lat] = event.lngLat;
      console.log(`Координаты: ${lng}, ${lat}`);

      if (selecting !== 'end') {
        const marker = new mapgl.Marker(map, {
          coordinates: [lng, lat],
          icon: 'https://docs.2gis.com/img/dotMarker.svg',
        });
        markers.push(marker);
      }

      if (selecting === 'a') {
        firstPoint = { lon: lng, lat: lat };
        selecting = 'b';
      } else if (selecting === 'b') {
        secondPoint = { lon: lng, lat: lat };
        selecting = 'end';
      }

      if (firstPoint && secondPoint) {
        fetchRoute([firstPoint, secondPoint]);
        resetButton.disabled = false;
        resetButton.textContent = 'Сбросить точки';
      }
    });

    function fetchRoute(points) {
      fetch(reqUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          points,
          locale: "ru",
          transport: "driving",
          filters: ["dirt_road", "toll_road", "ferry"],
          output: "detailed"
        })
      })
        .then((res) => {
          if (!res.ok) {
            throw new Error(`Ошибка HTTP! Статус: ${res.status}`);
          }
          return res.json();
        })
        .then((parsed) => {
          if (parsed.result && parsed.result.length > 0) {
            const coordinates = parsed.result[0].maneuvers
              .flatMap((maneuver) => {
                if (
                  maneuver.outcoming_path &&
                  maneuver.outcoming_path.geometry &&
                  maneuver.outcoming_path.geometry.length > 0
                ) {
                  return maneuver.outcoming_path.geometry
                    .flatMap((geometry) => {
                      const selection = geometry.selection;
                      return selection
                        .replace("LINESTRING(", "")
                        .replace(")", "")
                        .split(",")
                        .map((point) => point.trim().split(" ").map(Number));
                    });
                }
                return [];
              });

            if (coordinates.length > 0) {
              renderRoute(coordinates);
            } else {
              console.error("Координаты не найдены в ответе");
            }
          } else {
            console.error("Маршрут не найден в ответе");
          }
        })
        .catch((err) => console.error("Ошибка при получении данных маршрута:", err.message || err));
    }

    function renderRoute(coordinates) {
      if (routeLine) {
        routeLine.destroy();
      }
      routeLine = new mapgl.Polyline(map, {
        coordinates,
        width: 6,
        color: "#0078FF",
      });
    }
  </script>
</body>

</html>
