<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2GIS MapGL + 6 объектов</title>

    <style>
      html, body { height: 100%; margin: 0; }
      .app { height: 100%; display: flex; }
      #map { flex: 1; min-width: 0; }
      .sidebar {
        width: 320px;
        box-sizing: border-box;
        padding: 12px;
        border-left: 1px solid #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .sidebar h3 { margin: 0 0 10px; font-size: 16px; }
      .btn {
        width: 100%;
        text-align: left;
        padding: 10px 12px;
        margin: 0 0 8px;
        border: 1px solid #d0d0d0;
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
      }
      .btn:hover { background: #f6f6f6; }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .hint { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.4; }
    </style>
  </head>

  <body>
    <div class="app">
      <div id="map"></div>

      <div class="sidebar">
        <h3>Объекты</h3>
        <div id="buttons"></div>
        <div class="hint">
          Если кнопки не “оживают”, проверь ключ для Catalog API и доступ к нему.
        </div>
      </div>
    </div>

    <script src="https://mapgl.2gis.com/api/js/v1"></script>
    <script>
      // 1) fe4adee4-e725-4509-809d-c0b52219c501
      const MAPGL_KEY = 'PASTE_MAPGL_KEY_HERE';

      // 2) fe4adee4-e725-4509-809d-c0b52219c501
      const CATALOG_KEY = 'PASTE_CATALOG_KEY_HERE';

      // Твои ссылки. id берём из хвоста URL.
      const places = [
        { id: '70000001114107046', url: 'https://2gis.ru/kaliningrad/firm/70000001114107046', label: 'Объект 1' },
        { id: '70000001114106962', url: 'https://2gis.ru/kaliningrad/firm/70000001114106962', label: 'Объект 2' },
        { id: '70000001114107076', url: 'https://2gis.ru/kaliningrad/firm/70000001114107076', label: 'Объект 3' },
        { id: '70000001114106989', url: 'https://2gis.ru/svetlyj/firm/70000001114106989', label: 'Объект 4' },
        { id: '70000001114107027', url: 'https://2gis.ru/zelenogradsk/firm/70000001114107027', label: 'Объект 5' },
        { id: '70000001114106756', url: 'https://2gis.ru/svetlogorsk/firm/70000001114106756', label: 'Объект 6' },
      ];

      const map = new mapgl.Map('map', {
        center: [20.4522, 54.7104], // Калининград (старт)
        zoom: 10,
        key: MAPGL_KEY,
        style: 'c080bb6a-8134-4993-93a1-5b4d8c36a59b'
      });

      // Один попап, который переиспользуем
      let popup = null;

      // Маркеры по id
      const markers = new Map();

      function setPopup(coordinates, html) {
        if (popup) popup.destroy();
        popup = new mapgl.Popup(map, { coordinates, html });
      }

      async function loadItemsById(ids) {
        const url = new URL('https://catalog.api.2gis.com/3.0/items/byid');
        url.searchParams.set('key', CATALOG_KEY);
        url.searchParams.set('id', ids.join(','));
        url.searchParams.set('locale', 'ru_RU');
        // Важно: нам нужна точка на карте
        url.searchParams.set('fields', 'items.point,items.name');

        const res = await fetch(url.toString());
        if (!res.ok) throw new Error(`Catalog API error: ${res.status} ${res.statusText}`);
        const data = await res.json();

        const items = (data && data.result && data.result.items) ? data.result.items : [];
        return items;
      }

      function getLonLatFromItem(item) {
        // В Catalog API point обычно приходит как { lon, lat }
        const p = item.point;
        if (!p || typeof p.lon !== 'number' || typeof p.lat !== 'number') return null;
        return [p.lon, p.lat];
      }

      function ensureMarker(id, coordinates) {
        if (markers.has(id)) return markers.get(id);
        const marker = new mapgl.Marker(map, { coordinates });
        markers.set(id, marker);
        return marker;
      }

      function focusPlace(place, item) {
        const coords = getLonLatFromItem(item);
        if (!coords) {
          alert('У объекта нет координат в ответе API (items.point).');
          return;
        }

        ensureMarker(place.id, coords);

        map.setCenter(coords);
        map.setZoom(16);

        const name = item.name || place.label;
        setPopup(coords, `
          <div style="font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial;">
            <div style="font-weight: 600; margin-bottom: 6px;">${name}</div>
            <a href="${place.url}" target="_blank" rel="noopener noreferrer">
              Открыть в 2ГИС
            </a>
          </div>
        `);
      }

      async function init() {
        // Рисуем кнопки
        const buttonsEl = document.getElementById('buttons');
        buttonsEl.innerHTML = '';

        const btns = places.map((p, idx) => {
          const b = document.createElement('button');
          b.className = 'btn';
          b.textContent = `${idx + 1}. ${p.label}`;
          b.disabled = true; // включим после загрузки данных
          buttonsEl.appendChild(b);
          return b;
        });

        let items = [];
        try {
          items = await loadItemsById(places.map(p => p.id));
        } catch (e) {
          console.error(e);
          alert('Не удалось загрузить объекты из Catalog API. Проверь CATALOG_KEY и доступ к API.');
          // Кнопки оставим, но дадим хотя бы открывать ссылки
          btns.forEach((b, i) => {
            b.disabled = false;
            b.onclick = () => window.open(places[i].url, '_blank', 'noopener,noreferrer');
          });
          return;
        }

        // Сопоставим id -> item
        const byId = new Map(items.map(it => [String(it.id), it]));

        // Активируем кнопки
        btns.forEach((b, i) => {
          const place = places[i];
          const item = byId.get(place.id);

          b.disabled = false;
          b.onclick = () => {
            if (!item) {
              alert('Объект не найден по id в Catalog API (возможно, нет доступа или id другой).');
              window.open(place.url, '_blank', 'noopener,noreferrer');
              return;
            }
            focusPlace(place, item);
          };
        });

        // Автофокус на первом найденном
        const first = places.find(p => byId.get(p.id));
        if (first) focusPlace(first, byId.get(first.id));
      }

      init();
    </script>
  </body>
</html>
