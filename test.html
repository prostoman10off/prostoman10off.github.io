<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2GIS MapGL — 6 объектов</title>
    <style>
      html, body { height: 100%; margin: 0; }
      .app { height: 100%; display: flex; }
      #map { flex: 1; min-width: 0; }
      .sidebar {
        width: 320px;
        box-sizing: border-box;
        padding: 12px;
        border-left: 1px solid #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .btn {
        width: 100%;
        text-align: left;
        padding: 10px 12px;
        margin: 0 0 8px;
        border: 1px solid #d0d0d0;
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
      }
      .btn:hover { background: #f6f6f6; }
      #status { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.35; }
      code { background: #f3f3f3; padding: 0 4px; border-radius: 4px; }
    </style>
  </head>

  <body>
    <div class="app">
      <div id="map"></div>

      <div class="sidebar">
        <div style="font-weight:600;">Объекты</div>
        <div id="buttons" style="margin-top: 10px;"></div>
        <div id="status">
          Вставь ключ в <code>API_KEY</code>. Если карта не грузится — смотри Console.
        </div>
      </div>
    </div>

    <script src="https://mapgl.2gis.com/api/js/v1"></script>
    <script>
      // fe4adee4-e725-4509-809d-c0b52219c501
      const API_KEY = 'fe4adee4-e725-4509-809d-c0b52219c501';

      const places = [
        { id: '70000001114107046', label: '1', url: 'https://2gis.ru/kaliningrad/firm/70000001114107046' },
        { id: '70000001114106962', label: '2', url: 'https://2gis.ru/kaliningrad/firm/70000001114106962' },
        { id: '70000001114107076', label: '3', url: 'https://2gis.ru/kaliningrad/firm/70000001114107076' },
        { id: '70000001114106989', label: '4', url: 'https://2gis.ru/svetlyj/firm/70000001114106989' },
        { id: '70000001114107027', label: '5', url: 'https://2gis.ru/zelenogradsk/firm/70000001114107027' },
        { id: '70000001114106756', label: '6', url: 'https://2gis.ru/svetlogorsk/firm/70000001114106756' },
      ];

      const statusEl = document.getElementById('status');
      const setStatus = (t) => statusEl.textContent = t;

      // Карта
      const map = new mapgl.Map('map', {
        center: [20.4522, 54.7104], // старт: Калининград
        zoom: 10,
        key: API_KEY,
        style: 'c080bb6a-8134-4993-93a1-5b4d8c36a59b',
      });

      // Попап + маркеры
      let popup = null;
      const markers = new Map(); // id -> marker

      function setPopup(coordinates, title, subtitle) {
        if (popup) popup.destroy();
        popup = new mapgl.Popup(map, {
          coordinates,
          html: `
            <div style="font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial;">
              <div style="font-weight: 600; margin-bottom: 6px;">${title}</div>
              <div style="color:#666;">${subtitle || ''}</div>
            </div>
          `,
        });
      }

      function ensureMarker(id, coordinates) {
        if (markers.has(id)) {
          markers.get(id).setCoordinates(coordinates);
          return markers.get(id);
        }
        const marker = new mapgl.Marker(map, { coordinates });
        markers.set(id, marker);
        return marker;
      }

      // Catalog API: получить объект по id (чтобы узнать координаты)
      async function fetchItemById(id) {
        const url = new URL('https://catalog.api.2gis.com/3.0/items/byid');
        url.searchParams.set('key', API_KEY);
        url.searchParams.set('id', id);
        url.searchParams.set('locale', 'ru_RU');
        url.searchParams.set('fields', 'items.point,items.name');

        const res = await fetch(url.toString());
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`Catalog API ${res.status} ${res.statusText}: ${text}`);
        }
        const data = await res.json();
        return data?.result?.items?.[0] ?? null;
      }

      function coordsFromItem(item) {
        const p = item?.point;
        if (!p || typeof p.lon !== 'number' || typeof p.lat !== 'number') return null;
        return [p.lon, p.lat];
      }

      async function showPlace(place) {
        setStatus(`Загружаю объект ${place.id}…`);
        try {
          const item = await fetchItemById(place.id);
          if (!item) {
            setStatus(`Объект ${place.id} не найден в Catalog API.`);
            return;
          }

          const coords = coordsFromItem(item);
          if (!coords) {
            setStatus(`У объекта ${place.id} нет координат (items.point).`);
            return;
          }

          ensureMarker(place.id, coords);
          map.setCenter(coords);
          map.setZoom(16);

          const title = item.name || `Объект ${place.label}`;
          setPopup(coords, title, place.id);

          setStatus(`Показал: ${title}`);
        } catch (e) {
          console.error(e);
          setStatus('Ошибка загрузки данных объекта. Открой Console и проверь ответ Catalog API/ключ.');
        }
      }

      // Кнопки
      const buttonsEl = document.getElementById('buttons');
      places.forEach((p, idx) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = `${idx + 1}. Показать объект на карте`;
        b.addEventListener('click', () => showPlace(p));
        buttonsEl.appendChild(b);
      });

      setStatus('Готово. Нажми кнопку — объект покажется на карте.');
    </script>
  </body>
</html>
